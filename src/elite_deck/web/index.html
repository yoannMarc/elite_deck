<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#06090f">
<title>Elite Deck</title>
<style>
  :root {
    --bg:#06090f; --panel:#0b1018; --edge:#16202e; --edge-hot:#663413;
    --accent:#ff7a00; --accent-glow:#ff5500; --text:#ffb066; --bright:#ffd9a8;
    --dim:#5a6470; --off:#1a2230;
    --amber:#ff9d2e; --red:#ff3b3b; --green:#34d97b; --blue:#2bb3ff;
    --scan:rgba(255,122,0,0.035);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { background:var(--bg); color:var(--text);
    font-family:"Jura","Segoe UI",system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    overflow-x:hidden; min-height:100vh; user-select:none; }
  body::before { content:""; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent 0 2px,var(--scan) 2px 4px); }

  .wrap { max-width:1100px; margin:0 auto; padding:12px; }

  header { display:flex; align-items:center; gap:14px; padding:12px 18px;
    background:linear-gradient(90deg,var(--panel),transparent); border-left:4px solid var(--accent);
    margin-bottom:14px; clip-path:polygon(0 0,100% 0,100% 100%,16px 100%,0 calc(100% - 16px)); }
  header h1 { font-size:17px; font-weight:700; letter-spacing:4px; color:var(--accent);
    text-transform:uppercase; }
  .conn { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:11px;
    letter-spacing:1px; text-transform:uppercase; color:var(--dim); }
  .conn .dot { width:9px; height:9px; border-radius:50%; background:var(--red);
    box-shadow:0 0 8px var(--red); transition:.3s; }
  .conn.live .dot { background:var(--green); box-shadow:0 0 8px var(--green); }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:760px){ .grid{ grid-template-columns:1fr; } }

  .panel { background:var(--panel); border:1px solid var(--edge); border-top:1px solid var(--edge-hot);
    padding:14px 16px; clip-path:polygon(0 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%); }
  .panel h2 { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--dim);
    margin-bottom:12px; border-bottom:1px solid var(--edge); padding-bottom:6px; }

  .row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; font-size:13px; }
  .row .k { color:var(--dim); letter-spacing:1px; }
  .row .v { color:var(--bright); font-weight:600; font-variant-numeric:tabular-nums; }
  .row .v.big { font-size:20px; color:var(--accent); }

  .bar { height:7px; background:var(--off); margin-top:4px; overflow:hidden; }
  .bar>span { display:block; height:100%; transition:width .4s ease; }
  .bar.hull>span { background:var(--green); box-shadow:0 0 8px var(--green); }
  .bar.fuel>span { background:var(--accent); box-shadow:0 0 8px var(--accent); }

  .pips { display:flex; gap:18px; justify-content:space-around; padding:6px 0; }
  .pipgroup { text-align:center; }
  .pipgroup .label { font-size:10px; letter-spacing:2px; color:var(--dim); margin-bottom:6px; }
  .pipbars { display:flex; gap:3px; justify-content:center; }
  .pipbar { width:11px; height:24px; background:var(--off); }
  .pipbar.fill { box-shadow:0 0 6px currentColor; }
  .sys .pipbar.fill { background:var(--blue); color:var(--blue); }
  .eng .pipbar.fill { background:var(--green); color:var(--green); }
  .wep .pipbar.fill { background:var(--red); color:var(--red); }
  .pipgroup .num { font-size:13px; margin-top:5px; color:var(--bright); font-weight:700; }

  /* ── Macro buttons (the deck) ────────────────────────────────── */
  .deck { grid-column:1/-1; }
  .deck h2 { display:flex; align-items:center; gap:8px; }
  .macro-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
  .macro { position:relative; border:1px solid var(--off); background:#0e1521; color:var(--text);
    padding:16px 10px; font-family:inherit; font-size:13px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; cursor:pointer; transition:.12s;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
    min-height:64px; display:flex; align-items:center; justify-content:center; text-align:center; }
  .macro:active { transform:scale(.95); }
  .macro .cat { position:absolute; top:5px; left:8px; font-size:8px; letter-spacing:1px;
    color:var(--dim); font-weight:400; }
  .macro.amber { --c:var(--amber); }
  .macro.red   { --c:var(--red); }
  .macro.green { --c:var(--green); }
  .macro.blue  { --c:var(--blue); }
  .macro { --c:var(--accent); }
  .macro:hover { border-color:var(--c); color:var(--c); }
  /* État actif reflété depuis Status (status_flag) */
  .macro.on { background:var(--c); color:#000; border-color:var(--c);
    box-shadow:0 0 14px var(--c); }
  /* Flash de confirmation à l'appui */
  .macro.flash { animation:flash .4s ease; }
  @keyframes flash { 0%{box-shadow:0 0 0 var(--c);} 30%{box-shadow:0 0 18px var(--c);} 100%{box-shadow:0 0 0 transparent;} }

  .flags { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:5px 9px;
    border:1px solid var(--off); color:var(--dim);
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px); }
  .chip.on { color:#000; background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px var(--accent-glow); font-weight:700; }
  .chip.warn.on { background:var(--red); border-color:var(--red); box-shadow:0 0 10px var(--red); }

  .route { list-style:none; font-size:12px; }
  .route li { padding:3px 0; display:flex; gap:8px; }
  .route li::before { content:"›"; color:var(--accent); }
  .empty { color:var(--dim); font-size:12px; font-style:italic; }
  footer { text-align:center; color:var(--dim); font-size:10px; letter-spacing:2px;
    margin-top:16px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>◈ Elite Deck</h1>
    <div class="conn" id="conn"><span class="dot"></span><span id="connText">Hors ligne</span></div>
  </header>

  <!-- Macro deck en haut : c'est l'élément d'action principal sur tablette -->
  <section class="panel deck">
    <h2>Commandes <span id="ackHint" style="color:var(--dim);font-weight:400;letter-spacing:1px;"></span></h2>
    <div class="macro-grid" id="macros"></div>
  </section>

  <div class="grid">
    <section class="panel">
      <h2>Vaisseau</h2>
      <div class="row"><span class="k">Type</span><span class="v" id="shipType">—</span></div>
      <div class="row"><span class="k">Nom</span><span class="v" id="shipName">—</span></div>
      <div class="row"><span class="k">Coque</span><span class="v" id="hullPct">—</span></div>
      <div class="bar hull"><span id="hullBar" style="width:0%"></span></div>
      <div class="row" style="margin-top:8px"><span class="k">Carburant</span><span class="v" id="fuelTxt">—</span></div>
      <div class="bar fuel"><span id="fuelBar" style="width:0%"></span></div>
    </section>

    <section class="panel">
      <h2>Distribution énergie</h2>
      <div class="pips">
        <div class="pipgroup sys"><div class="label">SYS</div><div class="pipbars" id="pipSys"></div><div class="num" id="pipSysN">0</div></div>
        <div class="pipgroup eng"><div class="label">ENG</div><div class="pipbars" id="pipEng"></div><div class="num" id="pipEngN">0</div></div>
        <div class="pipgroup wep"><div class="label">WEP</div><div class="pipbars" id="pipWep"></div><div class="num" id="pipWepN">0</div></div>
      </div>
    </section>

    <section class="panel">
      <h2>Navigation</h2>
      <div class="row"><span class="k">Système</span><span class="v" id="navSystem">—</span></div>
      <div class="row"><span class="k">Corps</span><span class="v" id="navBody">—</span></div>
      <div class="row"><span class="k">Station</span><span class="v" id="navStation">—</span></div>
      <div class="row"><span class="k">Sauts restants</span><span class="v big" id="navJumps">0</span></div>
    </section>

    <section class="panel">
      <h2>Route planifiée</h2>
      <ul class="route" id="route"><li class="empty">Aucune route tracée</li></ul>
    </section>

    <section class="panel" style="grid-column:1/-1">
      <h2>État des systèmes</h2>
      <div class="flags" id="flags"></div>
    </section>
  </div>

  <footer>Temps réel · WebSocket · Les commandes sont exécutées sur le PC</footer>
</div>

<script>
const FLAG_DEFS = [
  ["landing_gear","Train"],["shields","Boucliers"],["hardpoints","Armes"],
  ["cargo_scoop","Cargo scoop"],["analysis_mode","Analyse"],["supercruise","Supercruise"],
  ["lights","Lumières"],["fsd_charging","FSD"],["docked","Amarré"],["silent_running","Silent"],
  ["night_vision","Vision nuit"],["sco_active","SCO"],
  ["low_fuel","Carb. bas","warn"],["overheating","Surchauffe","warn"],
  ["in_danger","Danger","warn"],["being_interdicted","Interdiction","warn"],
];

let state = {};
let macros = [];
let ws = null;

const $ = (id) => document.getElementById(id);
function setText(id,v){ const e=$(id); if(e) e.textContent=(v==null||v==="")?"—":v; }
function fmtCredits(n){ return (n||0).toLocaleString("fr-FR")+" Cr"; }

function buildPips(id,count){
  const c=$(id); c.innerHTML="";
  for(let i=0;i<4;i++){ const f=Math.max(0,Math.min(2,count-i*2));
    const b=document.createElement("div"); b.className="pipbar"+(f>0?" fill":"");
    if(f===1) b.style.opacity="0.5"; c.appendChild(b); }
}

// ── Construit les boutons macro depuis la liste serveur ─────────────
function buildMacros(){
  const c=$("macros"); c.innerHTML="";
  for(const m of macros){
    const b=document.createElement("button");
    b.className="macro "+(m.accent||"");
    b.dataset.id=m.id;
    b.dataset.flag=m.status_flag||"";
    b.innerHTML=`<span class="cat">${m.category||""}</span>${m.label}`;
    b.addEventListener("click",()=>sendMacro(m.id,b));
    c.appendChild(b);
  }
}

function sendMacro(id,btn){
  if(ws && ws.readyState===WebSocket.OPEN){
    ws.send(JSON.stringify({type:"macro",id}));
    btn.classList.remove("flash"); void btn.offsetWidth; btn.classList.add("flash");
  }
}

function syncMacroStates(){
  const st=state.status||{};
  document.querySelectorAll(".macro").forEach(b=>{
    const flag=b.dataset.flag;
    if(flag) b.classList.toggle("on",!!st[flag]);
  });
}

function render(){
  const sh=state.ship||{}, st=state.status||{}, nav=state.navigation||{};

  setText("shipType",sh.type_label||sh.type);
  setText("shipName",sh.name);
  const hull=sh.hull_health??0;
  setText("hullPct",hull.toFixed(1)+" %");
  $("hullBar").style.width=hull+"%";
  const fm=sh.fuel_main??0, fc=sh.fuel_cap||0;
  setText("fuelTxt",fc?`${fm.toFixed(1)} / ${fc.toFixed(0)} T`:`${fm.toFixed(1)} T`);
  $("fuelBar").style.width=fc?Math.min(100,fm/fc*100)+"%":"0%";

  const pips=st.pips||[0,0,0];
  buildPips("pipSys",pips[0]); buildPips("pipEng",pips[1]); buildPips("pipWep",pips[2]);
  setText("pipSysN",(pips[0]/2).toFixed(1)); setText("pipEngN",(pips[1]/2).toFixed(1)); setText("pipWepN",(pips[2]/2).toFixed(1));

  setText("navSystem",nav.system); setText("navBody",nav.body); setText("navStation",nav.station);
  setText("navJumps",nav.jumps_remaining??0);

  const fc2=$("flags"); fc2.innerHTML="";
  for(const [k,label,kind] of FLAG_DEFS){
    const c=document.createElement("div");
    c.className="chip"+(kind?" "+kind:"")+(st[k]?" on":"");
    c.textContent=label; fc2.appendChild(c);
  }

  const rc=$("route"); const route=nav.route||[];
  if(route.length===0){ rc.innerHTML='<li class="empty">Aucune route tracée</li>'; }
  else { rc.innerHTML=""; route.forEach(s=>{ const li=document.createElement("li"); li.textContent=s; rc.appendChild(li); }); }

  syncMacroStates();
}

function applyPatch(changes){
  for(const [path,value] of Object.entries(changes)){
    const keys=path.split("."); let node=state;
    for(let i=0;i<keys.length-1;i++){ if(!(keys[i] in node)) node[keys[i]]={}; node=node[keys[i]]; }
    node[keys[keys.length-1]]=value;
  }
}

function setConn(live){
  $("conn").classList.toggle("live",live);
  $("connText").textContent=live?"En direct":"Reconnexion…";
}

function connect(){
  const proto=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>setConn(true);
  ws.onmessage=(ev)=>{
    const msg=JSON.parse(ev.data);
    if(msg.type==="snapshot"){ state=msg.state; render(); }
    else if(msg.type==="patch"){ applyPatch(msg.changes); render(); }
    else if(msg.type==="macros"){ macros=msg.macros; buildMacros(); syncMacroStates(); }
    else if(msg.type==="macro_ack"){
      $("ackHint").textContent=msg.ok?`✓ ${msg.id}`:`✗ ${msg.id}`;
      setTimeout(()=>$("ackHint").textContent="",1200);
    }
  };
  ws.onclose=()=>{ setConn(false); setTimeout(connect,1500); };
  ws.onerror=()=>ws.close();
}

connect();
</script>
</body>
</html>
