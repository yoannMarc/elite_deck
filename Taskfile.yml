version: "3"

vars:
  HOST: localhost
  FRONTEND_PORT: 5173
  BACKEND_PORT: 3300

tasks:

  dev:
    desc: "Full stack dev"
    cmds:
      - task: backend
      - task: frontend
      - task: open-browser

  backend:
    desc: "Lance backend Python"
    cmds:
      - cmd: cmd /c start "" cmd /k uv run python -m back --host 0.0.0.0 --port {{.BACKEND_PORT}}
        platforms: [windows]
      - cmd: uv run python -m back --host 0.0.0.0 --port {{.BACKEND_PORT}}
        platforms: [linux, darwin]

  frontend:
    desc: "Lance Vite"
    dir: src/front
    cmds:
      - cmd: cmd /c start "" cmd /k npm run dev
        platforms: [windows]
      - cmd: npm run dev
        platforms: [linux, darwin]

  open-browser:
    desc: "Ouvre le navigateur"
    cmds:
      - cmd: start "" "http://{{.HOST}}:{{.FRONTEND_PORT}}"
        platforms: [windows]
      - cmd: open "http://{{.HOST}}:{{.FRONTEND_PORT}}"
        platforms: [darwin]
      - cmd: xdg-open "http://{{.HOST}}:{{.FRONTEND_PORT}}"
        platforms: [linux]

  run:dev:
    desc: "Lance en mode verbose"
    cmds:
      - task: run
        vars:
          CLI_ARGS: "--verbose"

  install:
    desc: "Installe toutes les dépendances (uv sync --all-extras)"
    cmds:
      - uv sync --all-extras

  test:
    desc: "Lance les tests"
    cmds:
      - uv run pytest

  lint:
    desc: "Lint + format check (ruff)"
    cmds:
      - uv run ruff check src tests
      - uv run ruff format --check src tests

  fmt:
    desc: "Auto-format (ruff)"
    cmds:
      - uv run ruff format src tests
      - uv run ruff check --fix src tests
